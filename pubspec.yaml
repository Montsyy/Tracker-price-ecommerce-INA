name: smart_price_tracker
description: smart_price_tracker.

publish_to: 'none'

version: 2.3.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.3.2
  google_fonts: ^8.0.2
  fl_chart: ^0.70.0
  string_similarity: ^2.2.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

# Konfigurasi flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F8FAFA"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  # Memasukkan file .env agar dapat dibaca oleh flutter_dotenv
  assets:
    - .env
    - assets/icon/
